name: Publish Package to npmjs
on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1.0.0
        with:
          runtime: node@v26.4.0
      - name: Ensure clean working tree
        run: git --no-pager diff --exit-code
      - run: pnpm clean-package -- devDependencies scripts packageManager
      - run: pnpm stage publish --access public --provenance --no-git-checks
